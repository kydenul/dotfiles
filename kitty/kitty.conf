term xterm-256color

# Font
font_size 18
font_family Maple Mono NF CN

# Background image
background_image        ~/.config/images/alone.jpg
background_image_layout cscaled
background_tint         0.94

# Cursor
cursor_blink_interval   -1
cursor_trail            5
cursor_trail_decay      0.1 0.4
cursor_shape            block
macos_option_as_alt     yes
mouse_hide_wait         30

# Window layout
enabled_layouts                     *
remember_window_size                yes
macos_quit_when_last_window_closed  yes
initial_window_width                640
initial_window_height               480
hide_window_decorations             titlebar-only
window_padding_width                0

# TAB
tab_bar_edge            top
tab_bar_style           slant

# Scrollback
scrollback_lines                    50000

# Mouse & Selection
copy_on_select                      yes
select_by_word_characters           @-./_~?&=%+#
clipboard_control                   write-clipboard write-primary read-clipboard read-primary

# Hyperlinks
show_hyperlink_targets  yes

# Remote control (required for conditional keybindings)
allow_remote_control socket-only
listen_on unix:/tmp/kitty-{kitty_pid}

# ============================================================================
# Key Bindings
# ============================================================================

# cmd+backspace => delete from cursor to the beginning of the line
map cmd+backspace send_text all \x15

# ============================================================================
# Dual-mode keybindings: Tmux / Native Kitty
# When tmux is running → send Tmux prefix sequences (matched via var:in_tmux)
# Otherwise → use Kitty native tab/split actions
# ============================================================================

# # --- Native Kitty mode (default, no tmux) ---
# map cmd+1 goto_tab 1
# map cmd+2 goto_tab 2
# map cmd+3 goto_tab 3
# map cmd+4 goto_tab 4
# map cmd+5 goto_tab 5
# map cmd+6 goto_tab 6
# map cmd+7 goto_tab 7
# map cmd+8 goto_tab 8
# map cmd+9 goto_tab 9
# map cmd+t new_tab_with_cwd
# map cmd+d launch --location=vsplit --cwd=current
# map cmd+shift+d launch --location=hsplit --cwd=current
# map cmd+w close_window
# map cmd+r set_tab_title
# map cmd+h previous_tab
# map cmd+l next_tab
# map cmd+z toggle_layout stack

# --- Tmux mode (overrides above when in_tmux user variable is set via .zshrc) ---
# Conditional maps MUST come AFTER unconditional maps to override them
# Tmux prefix is Ctrl+Space (\x00)
# map --when-focus-on var:in_tmux cmd+1 send_text all \x00\x31
# map --when-focus-on var:in_tmux cmd+2 send_text all \x00\x32
# map --when-focus-on var:in_tmux cmd+3 send_text all \x00\x33
# map --when-focus-on var:in_tmux cmd+4 send_text all \x00\x34
# map --when-focus-on var:in_tmux cmd+5 send_text all \x00\x35
# map --when-focus-on var:in_tmux cmd+6 send_text all \x00\x36
# map --when-focus-on var:in_tmux cmd+7 send_text all \x00\x37
# map --when-focus-on var:in_tmux cmd+8 send_text all \x00\x38
# map --when-focus-on var:in_tmux cmd+9 send_text all \x00\x39
# map --when-focus-on var:in_tmux cmd+t send_text all \x00\x63
# map --when-focus-on var:in_tmux cmd+d send_text all \x00\x25
# map --when-focus-on var:in_tmux cmd+shift+d send_text all \x00\x22
# map --when-focus-on var:in_tmux cmd+w send_text all \x00\x78
# map --when-focus-on var:in_tmux cmd+r send_text all \x00\x2c
# map --when-focus-on var:in_tmux cmd+h send_text all \x00\x70
# map --when-focus-on var:in_tmux cmd+l send_text all \x00\x6e
# map --when-focus-on var:in_tmux cmd+semicolon send_text all \x00\x3b
# map --when-focus-on var:in_tmux cmd+z send_text all \x00\x7a
map cmd+1 send_text all \x00\x31
map cmd+2 send_text all \x00\x32
map cmd+3 send_text all \x00\x33
map cmd+4 send_text all \x00\x34
map cmd+5 send_text all \x00\x35
map cmd+6 send_text all \x00\x36
map cmd+7 send_text all \x00\x37
map cmd+8 send_text all \x00\x38
map cmd+9 send_text all \x00\x39
map cmd+t send_text all \x00\x63
map cmd+d send_text all \x00\x25
map cmd+shift+d send_text all \x00\x22
map cmd+w send_text all \x00\x78
map cmd+r send_text all \x00\x2c
map cmd+h send_text all \x00\x70
map cmd+l send_text all \x00\x6e
map cmd+semicolon send_text all \x00\x3b
map cmd+z send_text all \x00\x7a
